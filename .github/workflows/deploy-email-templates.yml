name: Deploy Email Templates to Drive

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (preview changes without updating)'
        required: false
        default: 'false'
      force_redeploy:
        description: 'Force redeploy all files to Drive (ignore existing files)'
        required: false
        default: 'false'
      rebuild_spreadsheet:
        description: 'Force rebuild spreadsheet (clear and rewrite all rows)'
        required: false
        default: 'false'
      cleanup_duplicates:
        description: 'Delete old duplicate files (keep only most recent version)'
        required: false
        default: 'false'

jobs:
  deploy-templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Deploy Email Templates
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.GAS_SERVICE_ACCOUNT_KEY }}
          DRIVE_FOLDER_ID: "1jiubgmDEeR0aLJ20E8tqIJTM-tFoHuCb"
          SPREADSHEET_ID: "1WvN4xU_ZxElwpkXQVdt0HlUkjXcCA_ZaImklSLvuzeI"
          SHEET_NAME: "Email Templates"
          ADMIN_EMAIL: "treasurer@geabotswana.org"
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          FORCE_REDEPLOY: ${{ github.event.inputs.force_redeploy }}
          REBUILD_SPREADSHEET: ${{ github.event.inputs.rebuild_spreadsheet }}
          CLEANUP_DUPLICATES: ${{ github.event.inputs.cleanup_duplicates }}
        run: |
          python - <<'PYTHON_EOF'
          import os
          import json
          import csv
          import glob
          from pathlib import Path
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          # Configuration
          SERVICE_ACCOUNT_JSON = os.environ['SERVICE_ACCOUNT_JSON']
          DRIVE_FOLDER_ID = os.environ['DRIVE_FOLDER_ID']
          SPREADSHEET_ID = os.environ['SPREADSHEET_ID']
          SHEET_NAME = os.environ['SHEET_NAME']
          ADMIN_EMAIL = os.environ['ADMIN_EMAIL']
          DRY_RUN = os.environ.get('DRY_RUN', 'false').lower() == 'true'
          FORCE_REDEPLOY = os.environ.get('FORCE_REDEPLOY', 'false').lower() == 'true'
          REBUILD_SPREADSHEET = os.environ.get('REBUILD_SPREADSHEET', 'false').lower() == 'true'
          CLEANUP_DUPLICATES = os.environ.get('CLEANUP_DUPLICATES', 'false').lower() == 'true'

          # Authenticate with Domain-Wide Delegation
          info = json.loads(SERVICE_ACCOUNT_JSON)
          creds = service_account.Credentials.from_service_account_info(
              info,
              scopes=[
                  'https://www.googleapis.com/auth/drive',
                  'https://www.googleapis.com/auth/spreadsheets'
              ]
          ).with_subject(ADMIN_EMAIL)
          drive_service = build('drive', 'v3', credentials=creds)
          sheets_service = build('sheets', 'v4', credentials=creds)

          # Read existing CSV to get semantic names
          csv_path = 'docs/email_templates/Email_Templates_Sheet.csv'
          template_map = {}

          if os.path.exists(csv_path):
              with open(csv_path, 'r') as f:
                  reader = csv.DictReader(f, delimiter='|')
                  for row in reader:
                      semantic_name = row['semantic_name']
                      template_map[semantic_name] = {
                          'display_name': row['display_name'],
                          'subject': row['subject'],
                          'drive_file_id': row['drive_file_id'],
                          'placeholders': row['placeholders'],
                          'active': row['active'],
                          'notes': row['notes']
                      }

          # Find all template files
          template_files = []
          for file_path in sorted(glob.glob('docs/email_templates/**/*.txt', recursive=True)):
              file_path = Path(file_path)
              semantic_name = file_path.stem
              if semantic_name not in ['_MANIFEST', 'README']:
                  template_files.append({
                      'file_path': file_path,
                      'semantic_name': semantic_name,
                      'display_name': file_path.name
                  })

          print(f"\n📧 Found {len(template_files)} email templates to process\n")

          # Process each template
          updates = {}
          for template in template_files:
              file_path = template['file_path']
              semantic_name = template['semantic_name']

              print(f"Processing: {semantic_name}")

              # Read file content
              with open(file_path, 'r', encoding='utf-8') as f:
                  content = f.read()

              # Try to find existing file using multiple methods:
              # 1. First check if CSV has a file ID (most reliable)
              existing_file_id = template_map.get(semantic_name, {}).get('drive_file_id', '')

              # Skip if file ID is empty or placeholder
              if existing_file_id in ('', 'TBD', 'N/A', 'PLACEHOLDER_UPLOAD_TO_DRIVE'):
                  existing_file_id = ''

              # 2. If not in CSV, query Drive by name
              if not existing_file_id:
                  query = f"name='{semantic_name}' and '{DRIVE_FOLDER_ID}' in parents and trashed=false"
                  results = drive_service.files().list(
                      q=query,
                      spaces='drive',
                      fields='files(id, name)',
                      pageSize=1,
                      supportsTeamDrives=True
                  ).execute()
                  files = results.get('files', [])
                  existing_file_id = files[0]['id'] if files else ''

              existing_file = [{'id': existing_file_id}] if existing_file_id else []

              if not DRY_RUN:
                  if existing_file and not FORCE_REDEPLOY:
                      # Update existing file (unless force_redeploy is true)
                      file_id = existing_file[0]['id']
                      media = MediaFileUpload(file_path, mimetype='text/plain', resumable=True)
                      drive_service.files().update(
                          fileId=file_id,
                          media_body=media,
                          supportsTeamDrives=True
                      ).execute()
                      print(f"  ✏️  Updated: {file_id}")
                      updates[semantic_name] = file_id
                  elif existing_file and FORCE_REDEPLOY:
                      # Force redeploy: delete old file and create new one
                      old_id = existing_file[0]['id']
                      drive_service.files().delete(fileId=old_id, supportsTeamDrives=True).execute()
                      file_metadata = {
                          'name': semantic_name,
                          'parents': [DRIVE_FOLDER_ID],
                          'mimeType': 'text/plain'
                      }
                      media = MediaFileUpload(file_path, mimetype='text/plain', resumable=True)
                      file = drive_service.files().create(
                          body=file_metadata,
                          media_body=media,
                          fields='id',
                          supportsTeamDrives=True
                      ).execute()
                      file_id = file.get('id')
                      print(f"  🔄 Redeployed: {file_id} (deleted {old_id})")
                      updates[semantic_name] = file_id
                  else:
                      # Create new file
                      file_metadata = {
                          'name': semantic_name,
                          'parents': [DRIVE_FOLDER_ID],
                          'mimeType': 'text/plain'
                      }
                      media = MediaFileUpload(file_path, mimetype='text/plain', resumable=True)
                      file = drive_service.files().create(
                          body=file_metadata,
                          media_body=media,
                          fields='id',
                          supportsTeamDrives=True
                      ).execute()
                      file_id = file.get('id')
                      print(f"  ✨ Created: {file_id}")
                      updates[semantic_name] = file_id
              else:
                  if existing_file:
                      if FORCE_REDEPLOY:
                          print(f"  [DRY RUN] Would redeploy: {existing_file[0]['id']}")
                      else:
                          print(f"  [DRY RUN] Would update: {existing_file[0]['id']}")
                  else:
                      print(f"  [DRY RUN] Would create new file in Drive")

          # Handle rebuild_spreadsheet: query Drive to get all file IDs
          if REBUILD_SPREADSHEET and not DRY_RUN:
              print(f"\n🔄 Rebuild mode: syncing file IDs...\n")

              # First, use any files we just created/updated
              for semantic_name, file_id in updates.items():
                  template_map[semantic_name]['drive_file_id'] = file_id
                  print(f"  Synced: {semantic_name} → {file_id}")

          else:
              # Normal mode: update template_map with files that were just created/updated
              for semantic_name, file_id in updates.items():
                  if semantic_name in template_map:
                      template_map[semantic_name]['drive_file_id'] = file_id

          # Cleanup duplicates: delete old versions, keep most recent
          if CLEANUP_DUPLICATES and not DRY_RUN:
              print(f"\n🧹 Cleaning up duplicate files...\n")
              deleted_count = 0
              found_duplicates = 0

              for semantic_name in template_map.keys():
                  query = f"name='{semantic_name}' and '{DRIVE_FOLDER_ID}' in parents and trashed=false"
                  results = drive_service.files().list(
                      q=query,
                      spaces='drive',
                      fields='files(id, createdTime)',
                      pageSize=100,
                      supportsTeamDrives=True
                  ).execute()
                  files = results.get('files', [])

                  if len(files) > 1:
                      found_duplicates += 1
                      # Sort by creation time, keep most recent
                      sorted_files = sorted(files, key=lambda x: x['createdTime'], reverse=True)
                      keep_id = sorted_files[0]['id']
                      template_map[semantic_name]['drive_file_id'] = keep_id

                      # Delete older versions
                      for f in sorted_files[1:]:
                          try:
                              drive_service.files().delete(fileId=f['id'], supportsTeamDrives=True).execute()
                              print(f"  🗑️  Deleted old version of {semantic_name}: {f['id']}")
                              deleted_count += 1
                          except Exception as e:
                              print(f"  ⚠️  Failed to delete {f['id']}: {str(e)}")

              print(f"\n✅ Found {found_duplicates} templates with duplicates, deleted {deleted_count} files!")
          elif CLEANUP_DUPLICATES and DRY_RUN:
              print(f"\n[DRY RUN] Would scan and delete duplicate files")

          # Update Email Templates sheet with new file IDs
          if (updates or REBUILD_SPREADSHEET or CLEANUP_DUPLICATES) and not DRY_RUN:
              action = "Rebuilding" if REBUILD_SPREADSHEET else "Updating"
              print(f"\n📊 {action} spreadsheet...\n")

              # Prepare data for sheet update
              rows = []
              for semantic_name, data in template_map.items():
                  rows.append([
                      semantic_name,
                      data['display_name'],
                      data['subject'],
                      data['drive_file_id'],
                      data['placeholders'],
                      data['active'],
                      data['notes']
                  ])

              # Clear and rewrite the sheet
              sheets_service.spreadsheets().values().clear(
                  spreadsheetId=SPREADSHEET_ID,
                  range=f"'{SHEET_NAME}'!A2:G",
              ).execute()

              sheets_service.spreadsheets().values().update(
                  spreadsheetId=SPREADSHEET_ID,
                  range=f"'{SHEET_NAME}'!A2",
                  valueInputOption='RAW',
                  body={'values': rows}
              ).execute()

              if REBUILD_SPREADSHEET:
                  print(f"✅ Rebuilt spreadsheet with all {len(template_map)} templates!")
              else:
                  print(f"✅ Updated {len(updates)} template file IDs in spreadsheet!")
          elif DRY_RUN:
              action = "rebuild" if REBUILD_SPREADSHEET else "update"
              count = len(template_map) if REBUILD_SPREADSHEET else len(updates)
              print(f"\n[DRY RUN] Would {action} spreadsheet with {count} templates")
              print("Re-run without dry_run to apply changes")

          print(f"\n{'✨ Deployment complete!' if not DRY_RUN else '✅ Dry run complete!'}")
          PYTHON_EOF
