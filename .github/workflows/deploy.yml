name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install googleapis

      - name: Deploy to GAS
        env:
          GAS_SERVICE_ACCOUNT_KEY: ${{ secrets.GAS_SERVICE_ACCOUNT_KEY }}
          SCRIPT_ID: 1mkzpnNfUm-ZTW-G6wEdGg4Jt1KiChOXrV5qjBNkm3eqx43Yn-7Z-2Ffv
        run: |
          node -e "
          const {google} = require('googleapis');
          const fs = require('fs');
          const path = require('path');

          const key = JSON.parse(process.env.GAS_SERVICE_ACCOUNT_KEY);
          const scriptId = process.env.SCRIPT_ID;

          const auth = new google.auth.JWT(
            key.client_email,
            null,
            key.private_key,
            ['https://www.googleapis.com/auth/script.projects']
          );

          const script = google.script({version: 'v1', auth});

          // Read all .gs and .html files
          const files = fs.readdirSync('.').filter(f => 
            f.endsWith('.gs') || f.endsWith('.html') || f === 'appsscript.json'
          );

          const fileContents = files.map(f => ({
            name: f.replace(/\.(gs|html|json)$/, ''),
            type: f.endsWith('.html') ? 'HTML' : 'SERVER_JS',
            source: fs.readFileSync(f, 'utf8')
          }));

          // Fix appsscript.json entry
          const manifest = fileContents.find(f => f.name === 'appsscript');
          if (manifest) manifest.type = 'JSON';

          script.projects.updateContent({
            scriptId,
            requestBody: { files: fileContents }
          }).then(() => console.log('Deploy successful'))
            .catch(e => { console.error(e.message); process.exit(1); });
          "
