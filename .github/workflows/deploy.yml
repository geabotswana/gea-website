name: Deploy to GEA Botswana Shared Drive

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Google Apps Script
        uses: google-github-actions/setup-gcloud@v2 # Optional: standard GCP setup if needed

      - name: GAS Action
        uses: marketplace/actions/google-apps-script-gas-action@v1 # Use the official GAS Action
        with:
          # Your Service Account JSON key from GitHub Secrets
          serviceAccountJsonPlainText: ${{ secrets.GAS_SERVICE_ACCOUNT_KEY }}
          # The ID of the script on your Shared Drive
          scriptId: "1mkzpnNfUm-ZTW-G6wEdGg4Jt1KiChOXrV5qjBNkm3eqx43Yn-7Z-2Ffv"
          # Impersonate your treasurer account to bypass 16-hour limits
          impersonate: "treasurer@geabotswana.org"
          command: 'push'
