name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write service account key
        run: echo '${{ secrets.GAS_SERVICE_ACCOUNT_KEY }}' > sa_key.json

      - name: Authenticate clasp
        run: clasp login --creds sa_key.json

      - name: Push to GAS
        run: clasp push --scriptId 1mkzpnNfUm-ZTW-G6wEdGg4Jt1KiChOXrV5qjBNkm3eqx43Yn-7Z-2Ffv
