name: Deploy to GEA Botswana
on:
  workflow_run:
    workflows: ["Auto-update Deployment Metadata"]
    types: [completed]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull latest changes from main
        run: git pull origin main

      - name: Get commit message
        id: commit_msg
        run: echo "message=$(git log -1 --pretty=%B | head -1)" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Upload to Apps Script & Create Version
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.GAS_SERVICE_ACCOUNT_KEY }}
          SCRIPT_ID: "1mkzpnNfUm-ZTW-G6wEdGg4Jt1KiChOXrV5qjBNkm3eqx43Yn-7Z-2Ffv"
          ADMIN_EMAIL: "treasurer@geabotswana.org"
          COMMIT_MESSAGE: ${{ steps.commit_msg.outputs.message }}
        run: |
          python - <<EOF
          import os, json, time
          from google.oauth2 import service_account
          from googleapiclient.discovery import build

          # 1. Authenticate with impersonation
          info = json.loads(os.environ['SERVICE_ACCOUNT_JSON'])
          creds = service_account.Credentials.from_service_account_info(
              info, scopes=[
                  'https://www.googleapis.com/auth/script.projects',
                  'https://www.googleapis.com/auth/drive',
                  'https://www.googleapis.com/auth/script.deployments'
              ]
          ).with_subject(os.environ['ADMIN_EMAIL'])
          service = build('script', 'v1', credentials=creds)
          script_id = os.environ['SCRIPT_ID']
          commit_msg = os.environ['COMMIT_MESSAGE']

          # 2. Collect files
          EXPLICIT_EXCLUDES = {
              'BoardEmailConfig.gs',
              'requirements.txt',
              'index.html',
              'member.html'
          }
          EXCLUDE_DIRS = {'.git', '.github', '.claude', 'node_modules', 'docs', 'scripts'}

          files = []
          for dirpath, dirnames, filenames in os.walk('.'):
              dirnames[:] = [d for d in dirnames if d not in EXCLUDE_DIRS and not d.startswith('.')]
              for filename in filenames:
                  if filename in EXPLICIT_EXCLUDES:
                      continue
                  if filename == 'appsscript.json':
                      file_type = 'JSON'
                      name = 'appsscript'
                  elif filename.endswith(('.gs', '.js')):
                      file_type = 'SERVER_JS'
                      name = filename.replace('.gs', '').replace('.js', '')
                  elif filename.endswith('.html'):
                      file_type = 'HTML'
                      name = filename.replace('.html', '')
                  else:
                      continue
                  filepath = os.path.join(dirpath, filename)
                  with open(filepath, 'r') as f:
                      content = f.read()
                  files.append({'name': name, 'type': file_type, 'source': content})
                  print(f"Including: {filename}")

          print(f"\nTotal files to deploy: {len(files)}")

          # 3. Push code to GAS
          service.projects().updateContent(
              scriptId=script_id,
              body={'files': files}
          ).execute()
          print("✓ Code pushed to GAS")

          # 4. Create a new version
          version_response = service.projects().versions().create(
              scriptId=script_id,
              body={}
          ).execute()
          version_number = version_response['versionNumber']
          print(f"✓ Created version: {version_number}")

          # 5. Create a new deployment with descriptive name
          deployment_name = f"v{version_number}: {commit_msg[:60]}"
          deployment_response = service.projects().deployments().create(
              scriptId=script_id,
              body={
                  'versionNumber': str(version_number),
                  'manifestFileName': 'appsscript',
                  'description': deployment_name
              }
          ).execute()
          deployment_id = deployment_response['deploymentId']
          print(f"✓ Created deployment: {deployment_id}")
          print(f"  Name: {deployment_name}")
          print("✓ GEA Botswana system is now live!")
          EOF
