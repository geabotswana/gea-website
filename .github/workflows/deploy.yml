name: Deploy to GEA Botswana Shared Drive

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Clasp
        run: npm install -g @google/clasp

      - name: Authenticate and Push
        run: |
          # 1. Create the credentials file clasp needs
          # Since you have Domain-Wide Delegation, we use the Service Account
          echo '${{ secrets.GAS_SERVICE_ACCOUNT_KEY }}' > service-account.json
          
          # 2. Login using the Service Account key
          # Note: Standard clasp push requires a .clasprc.json. 
          # We'll use a direct script push if clasp acts up, 
          # but first, try to bypass the 16h limit this way:
          clasp login --service-account --key_file service-account.json
          
          # 3. Push the code
          clasp push -f
        env:
          # Your Script ID from the Shared Drive project
          CLASP_PROJECT_ID: "1mkzpnNfUm-ZTW-G6wEdGg4Jt1KiChOXrV5qjBNkm3eqx43Yn-7Z-2Ffv"
