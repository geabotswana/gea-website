name: Deploy to GEA Botswana

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Upload to Apps Script
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.GAS_SERVICE_ACCOUNT_KEY }}
          SCRIPT_ID: "1mkzpnNfUm-ZTW-G6wEdGg4Jt1KiChOXrV5qjBNkm3eqx43Yn-7Z-2Ffv"
          ADMIN_EMAIL: "treasurer@geabotswana.org"
        run: |
          python - <<EOF
          import os, json, base64
          from google.oauth2 import service_account
          from googleapiclient.discovery import build

          # 1. Authenticate with Impersonation
          info = json.loads(os.environ['SERVICE_ACCOUNT_JSON'])
          creds = service_account.Credentials.from_service_account_info(
              info, scopes=['https://www.googleapis.com']
          ).with_subject(os.environ['ADMIN_EMAIL'])

          service = build('script', 'v1', credentials=creds)

          # 2. Prepare files (simplified: reads all .gs and .html in root)
          files = []
          for filename in os.listdir('.'):
              if filename.endswith(('.gs', '.html', '.json')):
                  with open(filename, 'r') as f:
                      content = f.read()
                      # Apps Script calls the manifest 'appsscript', not 'appsscript.json'
                      name = filename.replace('.json', '') if filename == 'appsscript.json' else filename.split('.')[0]
                      type = 'SERVER_JS' if filename.endswith('.gs') else 'HTML' if filename.endswith('.html') else 'JSON'
                      files.append({'name': name, 'type': type, 'source': content})

          # 3. Push to Google
          service.projects().updateContent(
              scriptId=os.environ['SCRIPT_ID'],
              body={'files': files}
          ).execute()
          print("Successfully deployed to GEA Botswana Shared Drive!")
          EOF
