name: Deploy to GEA Botswana Shared Drive

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: GAS Action
        # This is the verified repository path
        uses: marcorinck/google-apps-script-gas-action@v1.0.3
        with:
          # Your raw JSON key from GitHub Secrets
          serviceAccountJsonPlainText: ${{ secrets.GAS_SERVICE_ACCOUNT_KEY }}
          # The ID of your project on the Shared Drive
          scriptId: "1mkzpnNfUm-ZTW-G6wEdGg4Jt1KiChOXrV5qjBNkm3eqx43Yn-7Z-2Ffv"
          # Your admin address to bypass the 16-hour session limit
          impersonate: "treasurer@geabotswana.org"
