name: Export Configuration Sheet to CSV

on:
  schedule:
    - cron: '0 3 * * *'   # 3:00 AM UTC daily (5:00 AM GMT+2)
  workflow_dispatch:        # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write           # Required to commit the updated CSV back to the repo

jobs:
  export-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Export Configuration sheet to CSV
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.GAS_SERVICE_ACCOUNT_KEY }}
          SPREADSHEET_ID: "1WvN4xU_ZxElwpkXQVdt0HlUkjXcCA_ZaImklSLvuzeI"
          SHEET_NAME: "Configuration"
          ADMIN_EMAIL: "treasurer@geabotswana.org"
        run: |
          python - <<'PYTHON_EOF'
          import os
          import json
          import csv
          from pathlib import Path
          from google.oauth2 import service_account
          from googleapiclient.discovery import build

          # --- Auth ---
          SERVICE_ACCOUNT_JSON = os.environ['SERVICE_ACCOUNT_JSON']
          SPREADSHEET_ID       = os.environ['SPREADSHEET_ID']
          SHEET_NAME           = os.environ['SHEET_NAME']
          ADMIN_EMAIL          = os.environ['ADMIN_EMAIL']

          info  = json.loads(SERVICE_ACCOUNT_JSON)
          creds = service_account.Credentials.from_service_account_info(
              info,
              scopes=['https://www.googleapis.com/auth/spreadsheets.readonly']
          ).with_subject(ADMIN_EMAIL)
          sheets = build('sheets', 'v4', credentials=creds)

          # --- Read sheet ---
          result = sheets.spreadsheets().values().get(
              spreadsheetId=SPREADSHEET_ID,
              range=f"'{SHEET_NAME}'!A:Z",
          ).execute()

          rows = result.get('values', [])
          if not rows:
              print('No data found in Configuration sheet.')
              exit(1)

          headers = rows[0]
          data_rows = rows[1:]

          print(f'Read {len(data_rows)} rows with columns: {headers}')

          # --- Write CSV (pipe-delimited, consistent with Email_Templates_Sheet.csv) ---
          output_path = Path('docs/config/Configuration.csv')
          output_path.parent.mkdir(parents=True, exist_ok=True)

          with open(output_path, 'w', newline='', encoding='utf-8') as f:
              writer = csv.writer(f, delimiter='|')
              writer.writerow(headers)
              for row in data_rows:
                  # Pad short rows so every row has the same number of columns
                  padded = row + [''] * (len(headers) - len(row))
                  writer.writerow(padded)

          print(f'Written to {output_path}')
          PYTHON_EOF

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/config/Configuration.csv
          if git diff --staged --quiet; then
            echo "Configuration unchanged — nothing to commit."
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "chore: export Configuration sheet ($TIMESTAMP) [automated]"
            git push origin main
          fi
