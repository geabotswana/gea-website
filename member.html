<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GEA Member Portal</title>

  <!-- ============================================================ -->
  <!-- FAVICON                                                      -->
  <!-- ============================================================ -->
  <link rel="icon" type="image/png" href="https://storage.googleapis.com/gea-public-assets/gea-logo-round-32.png">

  <style>
    /* ============================================================ */
    /* RESET AND DEFAULTS                                           */
    /* ============================================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      font-family: 'Source Sans 3', 'Segoe UI', Arial, sans-serif;
      background: #F5F5F5;
    }

    /* ============================================================ */
    /* ENVIRONMENT CONTROL PANEL & DEPLOYMENT STATUS                */
    /* ============================================================ */
    #envControlPanel {
      position: fixed;
      bottom: 16px;
      left: 8px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 360px;
      font-family: 'Source Sans 3', Arial, sans-serif;
    }

    .env-toggle {
      display: inline-flex;
      background: rgba(12, 24, 36, 0.92);
      border-radius: 999px;
      padding: 4px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(10px);
      gap: 0;
    }

    .env-toggle button {
      border: 0;
      background: transparent;
      color: #d7e3ec;
      font: 700 12px/1.1 Arial, sans-serif;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 999px;
      transition: all 0.2s ease;
    }

    .env-toggle button:hover {
      color: #fff;
    }

    .env-toggle button.active {
      background: #ffffff;
      color: #0a3161;
    }

    .deployment-status {
      background: rgba(12, 24, 36, 0.94);
      color: #eef4f8;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
      font: 12px/1.4 Arial, sans-serif;
      padding: 8px 12px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
    }

    .deployment-status.status-loading {
      border-color: rgba(194, 139, 0, 0.5);
    }

    .deployment-status.status-ready-dev {
      border-color: rgba(21, 101, 192, 0.5);
    }

    .deployment-status.status-ready-prod {
      border-color: rgba(46, 125, 50, 0.5);
    }

    .deployment-status.status-mismatch {
      border-color: rgba(198, 40, 40, 0.8);
      background: rgba(58, 16, 16, 0.95);
    }

    .deployment-status.status-timeout {
      border-color: rgba(230, 81, 0, 0.5);
    }

    .status-line {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }

    .status-line:last-child {
      margin-bottom: 0;
    }

    .status-label {
      color: #9fb2c1;
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.05em;
    }

    .env-pill,
    .status-badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 2px 8px;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.04em;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .status-badge {
      background: rgba(255, 255, 255, 0.14);
    }

    .status-row {
      margin-top: 6px;
      color: #ffd7d7;
      font-size: 11px;
    }

    @media (max-width: 640px) {
      #envControlPanel {
        left: 10px;
        bottom: 10px;
        max-width: none;
      }
    }

    /* ============================================================ */
    /* IFRAME CONTAINER (Full Page)                                 */
    /* ============================================================ */
    #iframe-container {
      height: 100vh;
      width: 100%;
      overflow: hidden;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>

<body>

<!-- ================================================================ -->
<!-- ENVIRONMENT CONTROL PANEL & DEPLOYMENT STATUS                   -->
<!-- Shows selected vs loaded environment, deployment timestamp       -->
<!-- Commented out: config setting show_devprod_box not reliably     -->
<!-- hiding this box; temporarily disabled here instead.             -->
<!-- ================================================================ -->

  <div id="envToggle" class="env-toggle">

  </div>
  <div id="deploymentStatus" class="deployment-status status-loading">
    <div class="status-line">
      <span class="status-label">Selected</span>
      <span id="selectedEnvPill" class="env-pill env-pill-selected">DEV</span>
      <span class="status-label">Loaded</span>
      <span id="reportedEnvPill" class="env-pill env-pill-reported">UNKNOWN</span>
      <span id="statusBadge" class="status-badge">Loading</span>
    </div>
    <div class="status-line">
      <span id="statusTimestamp">Build: —</span>

<!-- ================================================================ -->
<!-- IFRAME CONTAINER (Full-Page Portal Embed)                       -->
<!-- Full-height iframe that loads the GAS Member Portal             -->
<!-- ================================================================ -->
<div id="iframe-container">
  <iframe
    id="portalFrame"
    title="GEA Member Portal"
  ></iframe>
</div>

<script>
  // ================================================================
  // DEPLOYMENT CONFIGURATION
  // ================================================================
  var DEPLOYMENTS = {
    dev: {
      deploymentId: 'AKfycbzIS2NMUsEsp6drBGmWf8YDH44BXNa9g6nbvVOu-fg',
      execUrl: 'https://script.google.com/macros/s/AKfycbzIS2NMUsEsp6drBGmWf8YDH44BXNa9g6nbvVOu-fg/exec'
    },
    prod: {
      deploymentId: 'AKfycbw7DG2PpLUK9zrAQt9IVF35eQM7U-C3HUFyZIoQo7ChGB10xK5NuJRdUJpVrBjDwuAQ',
      execUrl: 'https://script.google.com/macros/s/AKfycbw7DG2PpLUK9zrAQt9IVF35eQM7U-C3HUFyZIoQo7ChGB10xK5NuJRdUJpVrBjDwuAQ/exec'
    }
  };

  var ALLOWED_IFRAME_ORIGINS = {
    'https://script.google.com': true,
    'https://script.googleusercontent.com': true
  };

  var STATUS_TIMEOUT_MS = 5000;
  var CONFIG_TIMEOUT_MS = 5000;
  var DEVPROD_CONFIG_KEY = 'show_devprod_box';

  var selectedEnv = localStorage.getItem('gea_env') || 'prod';
  var statusTimeout = null;
  var devProdControlEnabled = true;

  console.log('TEST: member.html initialized. selectedEnv:', selectedEnv);

  // ================================================================
  // HELPER FUNCTIONS
  // ================================================================

  function loadSelectedEnv() {
    return localStorage.getItem('gea_env') || 'prod';
  }

  function saveSelectedEnv(env) {
    localStorage.setItem('gea_env', env);
  }

  function buildIframeUrl(env) {
    var base = DEPLOYMENTS[env].execUrl;
    var url = new URL(base);
    url.searchParams.set('action', 'serve');
    return url.toString();
  }

  function setActiveEnvButton(env) {
    var devBtn = document.getElementById('envBtnDev');
    var prodBtn = document.getElementById('envBtnProd');
    if (devBtn) devBtn.classList.toggle('active', env === 'dev');
    if (prodBtn) prodBtn.classList.toggle('active', env === 'prod');
  }


  function parseBooleanConfigValue(value, defaultValue) {
    if (value === null || value === undefined || value === '') return defaultValue;
    if (typeof value === 'boolean') return value;
    var normalized = String(value).trim().toLowerCase();
    if (['true', '1', 'yes', 'y'].indexOf(normalized) !== -1) return true;
    if (['false', '0', 'no', 'n'].indexOf(normalized) !== -1) return false;
    return defaultValue;
  }

  function setEnvironmentControlVisibility(isVisible) {
    var panel = document.getElementById('envControlPanel');
    if (!panel) return;
    panel.style.display = isVisible ? 'flex' : 'none';
  }

  function requestConfigValue(key, callback) {
    var callbackName = 'geaConfigValueCallback_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    var script = document.createElement('script');
    var callbackInvoked = false;

    function cleanup() {
      if (!callbackInvoked && window[callbackName]) {
        delete window[callbackName];
      }
      if (script && script.parentNode) {
        try {
          script.parentNode.removeChild(script);
        } catch (e) {
          // Script may have already been removed
        }
      }
    }

    var timeoutId = setTimeout(function() {
      if (!callbackInvoked) {
        callbackInvoked = true;
        cleanup();
        callback(new Error('Config JSONP timeout'));
      }
    }, CONFIG_TIMEOUT_MS);

    // Define callback BEFORE setting src, with protection against double-invoke
    window[callbackName] = function(payload) {
      if (callbackInvoked) return;
      callbackInvoked = true;
      clearTimeout(timeoutId);
      cleanup();
      callback(null, payload);
    };

    script.onerror = function() {
      if (!callbackInvoked) {
        callbackInvoked = true;
        clearTimeout(timeoutId);
        cleanup();
        callback(new Error('Config JSONP request failed'));
      }
    };

    script.onload = function() {
      // Timeout if callback wasn't invoked within 100ms of load
      setTimeout(function() {
        if (!callbackInvoked) {
          if (!callbackInvoked) {
            callbackInvoked = true;
            clearTimeout(timeoutId);
            cleanup();
            callback(new Error('Config JSONP callback not invoked'));
          }
        }
      }, 100);
    };

    var url = new URL(DEPLOYMENTS.prod.execUrl);
    url.searchParams.set('action', 'config_value_jsonp');
    url.searchParams.set('callback', callbackName);
    url.searchParams.set('key', key);
    script.src = url.toString();
    script.async = true;
    document.head.appendChild(script);
  }

  function initializeEnvironmentSelection() {
    requestConfigValue(DEVPROD_CONFIG_KEY, function(err, payload) {
      if (!err && payload && payload.success) {
        devProdControlEnabled = parseBooleanConfigValue(payload.value, true);
      }

      if (!devProdControlEnabled) {
        selectedEnv = 'prod';
        saveSelectedEnv('prod');
        setEnvironmentControlVisibility(false);
        loadPortal('prod');
        return;
      }

      selectedEnv = loadSelectedEnv();
      setEnvironmentControlVisibility(true);
      loadPortal(selectedEnv);
    });
  }

  // ================================================================
  // STATUS RENDERING
  // ================================================================

  function renderStatus(state) {
    var root = document.getElementById('deploymentStatus');
    if (!root) return;
    var selectedPill = document.getElementById('selectedEnvPill');
    var reportedPill = document.getElementById('reportedEnvPill');
    var badge = document.getElementById('statusBadge');
    var timestamp = document.getElementById('statusTimestamp');
    var version = document.getElementById('statusVersion');
    var auth = document.getElementById('statusAuth');
    var warning = document.getElementById('statusWarning');

    root.className = 'deployment-status ' + state.statusClass;
    if (selectedPill) selectedPill.textContent = (state.selectedEnv || 'unknown').toUpperCase();
    if (reportedPill) reportedPill.textContent = (state.reportedEnv || 'unknown').toUpperCase();
    if (badge) badge.textContent = state.badgeText;
    if (timestamp) timestamp.textContent = 'Build: ' + (state.timestamp || '—');
    if (version) version.textContent = 'Version: ' + (state.version || '—') + ' | ID: ' + (state.buildId || '—');
    if (auth) auth.textContent = state.authenticated ? 'Signed in' : 'Not signed in';

    if (warning) {
      if (state.warning) {
        warning.hidden = false;
        warning.textContent = state.warning;
      } else {
        warning.hidden = true;
        warning.textContent = '';
      }
    }
  }

  function showLoadingStatus() {
    renderStatus({
      statusClass: 'status-loading',
      badgeText: 'Loading',
      selectedEnv: selectedEnv,
      reportedEnv: 'unknown',
      timestamp: '—',
      version: '—',
      buildId: '—',
      authenticated: false,
      warning: ''
    });
  }

  function showTimeoutStatus() {
    renderStatus({
      statusClass: 'status-timeout',
      badgeText: 'No Metadata',
      selectedEnv: selectedEnv,
      reportedEnv: 'unknown',
      timestamp: '—',
      version: '—',
      buildId: '—',
      authenticated: false,
      warning: 'No deployment metadata received from portal.'
    });
  }

  // ================================================================
  // LOAD PORTAL
  // ================================================================

  function loadPortal(env) {
    selectedEnv = env;
    saveSelectedEnv(env);
    setActiveEnvButton(env);

    // Load iframe
    document.getElementById('portalFrame').src = buildIframeUrl(env);

    // Query deployment metadata separately
    requestDeploymentInfo(env);
  }

  // ================================================================
  // DEPLOYMENT METADATA QUERY (JSONP)
  // ================================================================
  // Query selected deployment for metadata without relying on postMessage
  // (GAS sandbox blocks postMessage from iframe to external parent)

  function requestDeploymentInfo(env) {
    clearTimeout(statusTimeout);
    showLoadingStatus();

    var callbackName = 'geaDeploymentInfoCallback_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    var script = document.createElement('script');
    var callbackInvoked = false;

    window[callbackName] = function(data) {
      if (callbackInvoked) return;
      callbackInvoked = true;
      delete window[callbackName];
      if (script && script.parentNode) {
        try {
          script.parentNode.removeChild(script);
        } catch (e) {
          // Script may have already been removed
        }
      }
      clearTimeout(statusTimeout);

      var reportedEnv = data.deploymentId === DEPLOYMENTS.prod.deploymentId ? 'prod' :
                        data.deploymentId === DEPLOYMENTS.dev.deploymentId ? 'dev' : 'unknown';
      var mismatch = env !== reportedEnv;
      var readyClass = reportedEnv === 'prod' ? 'status-ready-prod' : 'status-ready-dev';

      renderStatus({
        statusClass: mismatch ? 'status-mismatch' : readyClass,
        badgeText: mismatch ? 'Mismatch' : 'Loaded',
        selectedEnv: env,
        reportedEnv: reportedEnv,
        timestamp: data.timestamp || '—',
        version: data.version || '—',
        buildId: data.buildId || '—',
        authenticated: false,
        warning: mismatch ? 'Loaded deployment does not match selected environment.' : ''
      });
    };

    script.onerror = function() {
      if (callbackInvoked) return;
      callbackInvoked = true;
      delete window[callbackName];
      if (script && script.parentNode) {
        try {
          script.parentNode.removeChild(script);
        } catch (e) {
          // Script may have already been removed
        }
      }
      clearTimeout(statusTimeout);
      showTimeoutStatus();
    };

    var url = new URL(DEPLOYMENTS[env].execUrl);
    url.searchParams.set('action', 'deployment_info_jsonp');
    url.searchParams.set('callback', callbackName);
    script.src = url.toString();
    script.async = true;

    statusTimeout = setTimeout(function() {
      if (!callbackInvoked && window[callbackName]) {
        callbackInvoked = true;
        delete window[callbackName];
        if (script && script.parentNode) {
          try {
            script.parentNode.removeChild(script);
          } catch (e) {
            // Script may have already been removed
          }
        }
        showTimeoutStatus();
      }
    }, STATUS_TIMEOUT_MS);

    document.head.appendChild(script);
  }

  // ================================================================
  // EVENT LISTENERS
  // ================================================================

  console.log('About to attach DOMContentLoaded listener');

  document.addEventListener('DOMContentLoaded', function() {
    console.log('DOMContentLoaded fired');
    var devBtn = document.getElementById('envBtnDev');
    var prodBtn = document.getElementById('envBtnProd');
    console.log('Button refs:', { devBtn: !!devBtn, prodBtn: !!prodBtn });

    if (devBtn && prodBtn) {
      devBtn.addEventListener('click', function(e) {
        e.preventDefault();
        console.log('DEV button clicked. Current env:', selectedEnv);
        if (!devProdControlEnabled) { return; }
        if (selectedEnv !== 'dev') {
          console.log('Switching to DEV...');
          loadPortal('dev');
        } else {
          console.log('Already in DEV, no action needed');
        }
      });

      prodBtn.addEventListener('click', function(e) {
        e.preventDefault();
        console.log('PROD button clicked. Current env:', selectedEnv);
        if (!devProdControlEnabled) { return; }
        if (selectedEnv !== 'prod') {
          console.log('Switching to PROD...');
          loadPortal('prod');
        } else {
          console.log('Already in PROD, no action needed');
        }
      });

      console.log('Environment buttons wired. Starting with:', selectedEnv);
    }

    initializeEnvironmentSelection();
  });
</script>

</body>
</html>
