<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GEA Membership Application</title>
  <link rel="icon" type="image/png" href="https://storage.googleapis.com/gea-public-assets/gea-logo-round-32.png">
  <style>
    body { font-family: 'Source Sans 3', 'Segoe UI', Arial, sans-serif; margin: 0; min-height: 100vh; display: grid; place-items: center; background: #F5F5F5; color: #0A3161; }
    .card { background: #fff; border: 1px solid #E0E0E0; border-radius: 8px; padding: 24px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); text-align: center; max-width: 460px; }
    a { color: #0A3161; font-weight: 600; }
  </style>
  <script>
    // Set intendedMode in localStorage before redirecting to Portal
    localStorage.setItem('intendedMode', 'apply');
    // Redirect to the member portal
    window.location.href = 'https://script.google.com/a/macros/geabotswana.org/s/AKfycbw7DG2PpLUK9zrAQt9IVF35eQM7U-C3HUFyZIoQo7ChGB10xK5NuJRdUJpVrBjDwuAQ/exec';
  </script>
</head>
<body>
  <div class="card">
    <p>Redirecting you to the GEA membership application…</p>
    <p>If you are not redirected automatically, <a href="https://script.google.com/a/macros/geabotswana.org/s/AKfycbw7DG2PpLUK9zrAQt9IVF35eQM7U-C3HUFyZIoQo7ChGB10xK5NuJRdUJpVrBjDwuAQ/exec" onclick="localStorage.setItem('intendedMode', 'apply')">open the application form</a>.</p>
  </div>
</body>
</html>
